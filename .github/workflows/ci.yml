name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  release-metadata:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.meta.outputs.release_version }}
      release_commit_sha: ${{ steps.meta.outputs.release_commit_sha }}
      deployment_environment: ${{ steps.meta.outputs.deployment_environment }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        shell: bash
        run: |
          RELEASE_VERSION="ci-${GITHUB_RUN_NUMBER}"
          RELEASE_COMMIT_SHA="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            DEPLOYMENT_ENVIRONMENT="production"
          else
            DEPLOYMENT_ENVIRONMENT="staging"
          fi
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_commit_sha=$RELEASE_COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "deployment_environment=$DEPLOYMENT_ENVIRONMENT" >> "$GITHUB_OUTPUT"

  lint-and-build:
    needs: release-metadata
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.release_version }}
      RELEASE_COMMIT_SHA: ${{ needs.release-metadata.outputs.release_commit_sha }}
      DEPLOYMENT_ENVIRONMENT: ${{ needs.release-metadata.outputs.deployment_environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  test:
    needs: release-metadata
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hotel_os_test
        ports: ['5432:5432']
      redis:
        image: redis:7
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/hotel_os_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.release_version }}
      RELEASE_COMMIT_SHA: ${{ needs.release-metadata.outputs.release_commit_sha }}
      DEPLOYMENT_ENVIRONMENT: ${{ needs.release-metadata.outputs.deployment_environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: cd apps/api && npx prisma migrate deploy
      - run: pnpm test
      - name: Release metadata summary
        run: pnpm release:metadata
