name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-metadata:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.meta.outputs.release_version }}
      release_commit_sha: ${{ steps.meta.outputs.release_commit_sha }}
      deployment_environment: ${{ steps.meta.outputs.deployment_environment }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        shell: bash
        run: |
          RELEASE_VERSION="release-${GITHUB_RUN_NUMBER}"
          RELEASE_COMMIT_SHA="${GITHUB_SHA::7}"
          DEPLOYMENT_ENVIRONMENT="production"
          RELEASE_TAG="${RELEASE_VERSION}-${RELEASE_COMMIT_SHA}"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_commit_sha=$RELEASE_COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "deployment_environment=$DEPLOYMENT_ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  build-and-push-images:
    needs: release-metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAMESPACE: ${{ github.repository_owner }}
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.release_version }}
      RELEASE_COMMIT_SHA: ${{ needs.release-metadata.outputs.release_commit_sha }}
      DEPLOYMENT_ENVIRONMENT: ${{ needs.release-metadata.outputs.deployment_environment }}
    outputs:
      api_image_url: ${{ steps.api-image.outputs.image_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract API image metadata
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/hotelos-api
          tags: |
            type=raw,value=${{ needs.release-metadata.outputs.release_tag }}
            type=raw,value=${{ needs.release-metadata.outputs.release_commit_sha }}
            type=raw,value=production-current
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}
          build-args: |
            RELEASE_VERSION=${{ env.RELEASE_VERSION }}
            RELEASE_COMMIT_SHA=${{ env.RELEASE_COMMIT_SHA }}
            DEPLOYMENT_ENVIRONMENT=${{ env.DEPLOYMENT_ENVIRONMENT }}
      - name: Capture API image URL
        id: api-image
        run: echo "image_url=ghcr.io/${{ github.repository_owner }}/hotelos-api:${{ needs.release-metadata.outputs.release_tag }}" >> "$GITHUB_OUTPUT"

  deploy-render:
    needs: [release-metadata, build-and-push-images]
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.release_version }}
      RELEASE_COMMIT_SHA: ${{ needs.release-metadata.outputs.release_commit_sha }}
      DEPLOYMENT_ENVIRONMENT: ${{ needs.release-metadata.outputs.deployment_environment }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
      RENDER_API_IMAGE_URL: ${{ needs.build-and-push-images.outputs.api_image_url }}
      MONITORING_ALERT_WEBHOOK_URL: ${{ secrets.MONITORING_ALERT_WEBHOOK_URL }}
      MONITORING_ALERT_DEDUP_MS: ${{ vars.MONITORING_ALERT_DEDUP_MS || '300000' }}
      RENDER_WAIT_FOR_LIVE: 'true'
    steps:
      - name: Check Render rollout configuration
        id: config
        shell: bash
        run: |
          if [[ -n "${RENDER_API_KEY}" && -n "${RENDER_API_SERVICE_ID}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Render rollout is configured."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Render rollout is not configured; skipping API deploy."
          fi
      - uses: actions/checkout@v4
        if: steps.config.outputs.configured == 'true'
      - uses: actions/setup-node@v4
        if: steps.config.outputs.configured == 'true'
        with:
          node-version: '20'
      - name: Roll out release to Render
        if: steps.config.outputs.configured == 'true'
        run: node scripts/render-rollout.mjs

  deploy-summary:
    needs: [release-metadata, build-and-push-images, deploy-render]
    if: ${{ always() && needs.build-and-push-images.result == 'success' && (needs.deploy-render.result == 'success' || needs.deploy-render.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Deployment summary
        run: |
          {
            echo "## Release ready"
            echo ""
            echo "- Release version: ${{ needs.release-metadata.outputs.release_version }}"
            echo "- Release commit: ${{ needs.release-metadata.outputs.release_commit_sha }}"
            echo "- Environment: ${{ needs.release-metadata.outputs.deployment_environment }}"
            echo "- API image tag: ghcr.io/${{ github.repository_owner }}/hotelos-api:${{ needs.release-metadata.outputs.release_tag }}"
            echo "- Frontend deploy: handled separately by Vercel"
            echo "- Render rollout: ${{ needs.deploy-render.result }}"
            echo ""
            echo "Render API rollout runs automatically when these repository secrets are set:"
            echo "- RENDER_API_KEY"
            echo "- RENDER_API_SERVICE_ID"
            echo "- MONITORING_ALERT_WEBHOOK_URL"
            echo ""
            echo "Runtime env vars applied during rollout:"
            echo "- RELEASE_VERSION=${{ needs.release-metadata.outputs.release_version }}"
            echo "- RELEASE_COMMIT_SHA=${{ needs.release-metadata.outputs.release_commit_sha }}"
            echo "- DEPLOYMENT_ENVIRONMENT=${{ needs.release-metadata.outputs.deployment_environment }}"
            echo "- MONITORING_ALERT_DEDUP_MS=${{ vars.MONITORING_ALERT_DEDUP_MS || '300000' }}"
          } >> "$GITHUB_STEP_SUMMARY"
